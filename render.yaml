services:
  - type: web
    name: tg-channel-digest-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_PATH
        value: data/bot.db
      - key: TIMEZONE
        value: Europe/Moscow
      - key: TELETHON_ENABLED
        value: false
      - key: TELEGRAM_API_ID
        value: 0
      - key: TELEGRAM_API_HASH
        sync: false
      - key: OPENAI_API_KEY
        sync: false
